<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JPTI · 日语学习人格测试</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root { --Y:#facc15; --K:#111827; --C:#fdfbf7; --O:#f97316; --T:#39C5BB; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{overflow:hidden;height:100dvh;background:#0d0d0d;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(255,255,255,.04) 20px),
    repeating-linear-gradient(90deg,transparent,transparent 19px,rgba(255,255,255,.04) 20px);
    display:flex;align-items:center;justify-content:center;
    font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;}
  .fG{font-family:'ZCOOL KuaiLe',cursive;} .fD{font-family:'DotGothic16',monospace;}
  #app{position:relative;overflow:hidden;width:100%;max-width:430px;height:100dvh;max-height:860px;
    background:var(--C);border:3px solid var(--K);
    box-shadow:8px 8px 0 0 var(--Y),11px 11px 0 0 var(--K);display:flex;flex-direction:column;}
  @media(min-height:900px){#app{border-radius:24px;height:calc(100dvh - 48px);}}
  #app::before{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:radial-gradient(var(--K) 1px,transparent 1px);background-size:18px 18px;opacity:.03;}
  #hdr{flex-shrink:0;z-index:20;background:var(--K);border-bottom:3px solid var(--Y);
    padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
  .hTag{background:var(--Y);color:var(--K);font-size:10px;padding:2px 7px;border:2px solid var(--K);letter-spacing:.15em;}
  .sc{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;
    transition:opacity .25s ease,transform .25s ease;}
  .sc.hidden{opacity:0;pointer-events:none;transform:translateY(8px);}
  /* START */
  #sStart{align-items:center;justify-content:center;padding:20px 22px 28px;text-align:center;
    background:var(--C);overflow-y:auto;}
  .logoS{width:108px;height:108px;background:white;border:3px solid var(--K);
    box-shadow:5px 5px 0 0 var(--Y),8px 8px 0 0 var(--K);border-radius:20px;font-size:52px;
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;transform:rotate(-3deg);
    animation:wobble 4s ease-in-out infinite;}
  @keyframes wobble{0%,100%{transform:rotate(-3deg) scale(1);}50%{transform:rotate(2deg) scale(1.04);}}
  .sT{font-size:32px;color:var(--K);line-height:1.18;margin-bottom:5px;}
  .sJ{font-size:11px;color:#999;letter-spacing:.3em;margin-bottom:16px;}
  .infoC{background:white;border:2.5px solid var(--K);box-shadow:3px 3px 0 0 var(--K);border-radius:12px;
    padding:13px 16px;font-size:13px;line-height:1.9;color:#555;text-align:left;margin-bottom:20px;width:100%;}
  .infoC strong{color:var(--K);}
  .iTag{display:inline-block;background:var(--Y);color:var(--K);font-weight:800;font-size:11px;padding:1px 5px;border:1.5px solid var(--K);}
  .btnS{width:100%;background:var(--Y);color:var(--K);font-size:25px;padding:17px 0;
    border:3px solid var(--K);box-shadow:5px 5px 0 0 var(--K);border-radius:14px;letter-spacing:.1em;cursor:pointer;transition:all .1s;}
  .btnS:active{box-shadow:none;transform:translate(5px,5px);}
  .btnS span{display:block;font-size:11px;opacity:.55;margin-top:3px;letter-spacing:.25em;}
  /* QUIZ */
  #sQuiz{background:var(--C);z-index:8;}
  .qBody{flex:1;display:flex;flex-direction:column;padding:16px 16px 10px;overflow:hidden;}
  .pRow{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
  .pLbl{font-size:11px;color:#aaa;letter-spacing:.18em;} .pLbl em{color:var(--O);font-style:normal;font-weight:800;}
  .pMod{font-size:10px;color:#ccc;letter-spacing:.08em;}
  .pTrack{height:7px;background:#e8e3da;border:2px solid var(--K);border-radius:99px;overflow:hidden;margin-bottom:14px;}
  .pFill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--O),var(--Y));
    transition:width .4s cubic-bezier(.34,1.56,.64,1);}
  .qN{font-size:11px;color:var(--O);letter-spacing:.22em;margin-bottom:5px;}
  .qT{font-size:17px;font-weight:700;color:var(--K);line-height:1.6;margin-bottom:3px;flex-shrink:0;}
  .qJ{font-size:11px;color:#bbb;margin-bottom:14px;letter-spacing:.06em;flex-shrink:0;}
  .oWrap{flex:1;overflow-y:auto;padding-right:2px;}
  .oWrap::-webkit-scrollbar{width:3px;} .oWrap::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
  .opt{background:white;border:3px solid var(--K);box-shadow:4px 4px 0 0 var(--K);border-radius:12px;
    padding:12px 13px;margin-bottom:9px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;
    transition:box-shadow .1s,transform .1s,background .1s;-webkit-tap-highlight-color:transparent;}
  .opt:active,.opt.sel{box-shadow:none;transform:translate(4px,4px);}
  .opt.sel{background:var(--Y);}
  .oK{width:29px;height:29px;flex-shrink:0;border:2.5px solid var(--K);border-radius:7px;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
    color:var(--K);background:var(--C);transition:background .1s,color .1s;}
  .opt.sel .oK{background:var(--K);color:var(--Y);}
  .oT{font-size:14px;font-weight:600;color:var(--K);line-height:1.5;padding-top:2px;}
  .qFt{flex-shrink:0;padding-top:10px;display:flex;gap:9px;}
  .btnP{flex:1;background:white;color:#aaa;font-size:16px;padding:12px 0;border:2.5px solid #ddd;
    box-shadow:3px 3px 0 0 #ddd;border-radius:11px;cursor:pointer;transition:all .1s;}
  .btnP:active{box-shadow:none;transform:translate(3px,3px);}
  .btnNx{flex:2;background:#e5e0d7;color:#bbb;font-size:18px;padding:12px 0;border:2.5px solid #ccc;
    border-radius:11px;cursor:not-allowed;transition:all .1s;}
  .btnNx.on{background:var(--K);color:var(--Y);border-color:var(--K);box-shadow:4px 4px 0 0 var(--O);cursor:pointer;}
  .btnNx.on:active{box-shadow:none;transform:translate(4px,4px);}
  /* LOADING */
  #sLoad{background:var(--K);z-index:40;align-items:center;justify-content:center;}
  .lFig{width:120px;height:120px;background:var(--Y);border:3px solid rgba(255,255,255,.15);border-radius:22px;
    display:flex;align-items:center;justify-content:center;font-size:64px;box-shadow:6px 6px 0 0 var(--O);
    margin-bottom:24px;animation:lB 1.3s ease-in-out infinite;}
  @keyframes lB{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-14px) rotate(4deg);}}
  .lMsg{font-size:21px;color:white;background:rgba(255,255,255,.1);padding:10px 26px;border-radius:12px;
    border:2px solid rgba(255,255,255,.12);letter-spacing:.1em;text-align:center;min-width:230px;transition:opacity .3s;}
  .lSub{font-size:11px;color:rgba(255,255,255,.35);margin-top:10px;letter-spacing:.3em;}
  .dots span{display:inline-block;animation:dF 1.2s ease infinite;}
  .dots span:nth-child(2){animation-delay:.2s;} .dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dF{0%,80%,100%{opacity:.25}40%{opacity:1}}
  /* RESULT */
  #sResult{background:var(--C);z-index:50;}
  .rScr{flex:1;overflow-y:auto;}
  .rScr::-webkit-scrollbar{width:4px;} .rScr::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}
  .rHero{padding:24px 20px 28px;text-align:center;position:relative;overflow:hidden;}
  .rHero::after{content:'JPTI';position:absolute;right:-10px;top:-5px;font-size:88px;
    color:rgba(255,255,255,.04);pointer-events:none;white-space:nowrap;font-family:'DotGothic16',monospace;}
  .rBadge{display:inline-block;background:var(--Y);color:var(--K);font-size:10px;font-weight:700;
    padding:3px 12px;border:2.5px solid rgba(255,255,255,.25);letter-spacing:.3em;margin-bottom:14px;text-transform:uppercase;}
  .rImg{width:148px;height:148px;background:white;border:3px solid rgba(255,255,255,.2);border-radius:20px;
    margin:0 auto 18px;overflow:hidden;box-shadow:6px 6px 0 0 var(--Y);transform:rotate(-3deg);
    transition:transform .3s ease;display:flex;align-items:center;justify-content:center;}
  .rImg:hover{transform:rotate(0deg);}
  .rImg img{width:100%;height:100%;object-fit:contain;}
  .rEn{font-size:22px;color:var(--Y);letter-spacing:.35em;margin-bottom:6px;font-family:'DotGothic16',monospace;font-weight:700;}
  .rNm{font-size:34px;color:white;margin-bottom:10px;letter-spacing:.04em;}
  .rJN{display:none;}
  .rBf{display:inline-block;background:var(--O);color:white;font-size:14px;font-weight:700;
    line-height:1.65;padding:10px 16px;border-radius:10px;border:2px solid rgba(255,255,255,.18);
    transform:rotate(1deg);max-width:290px;}
  .rBody{padding:18px 16px 26px;}
  .rCard{background:white;border:3px solid var(--K);box-shadow:4px 4px 0 0 var(--K);
    border-radius:14px;padding:16px;margin-bottom:13px;}
  .rCT{font-size:10px;color:var(--O);letter-spacing:.28em;text-transform:uppercase;margin-bottom:10px;
    display:flex;align-items:center;gap:6px;}
  .rCT::after{content:'';flex:1;height:2px;
    background:repeating-linear-gradient(90deg,var(--K) 0,var(--K) 4px,transparent 4px,transparent 8px);opacity:.12;}
  .rDes{font-size:14px;color:#444;line-height:1.85;}
  .pTags{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
  .pTag{background:var(--Y);color:var(--K);border:2px solid var(--K);border-radius:6px;
    font-size:12px;font-weight:700;padding:3px 9px;box-shadow:2px 2px 0 0 var(--K);letter-spacing:.04em;}
  .dBars{margin-top:12px;}
  .dRow{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
  .dLbl{font-size:10px;color:#888;width:62px;flex-shrink:0;text-align:right;letter-spacing:.04em;}
  .dTrk{flex:1;height:9px;background:#ece7de;border:2px solid var(--K);border-radius:99px;overflow:hidden;}
  .dFil{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.34,1.56,.64,1) .25s;}
  .dVal{font-size:10px;color:#aaa;width:24px;text-align:right;}
  .btnR{width:100%;margin-top:4px;background:var(--K);color:var(--Y);font-size:21px;padding:17px;
    border:3px solid var(--K);box-shadow:5px 5px 0 0 var(--O);border-radius:14px;letter-spacing:.09em;cursor:pointer;transition:all .1s;}
  .btnR:active{box-shadow:none;transform:translate(5px,5px);}
  .btnR span{display:block;font-size:11px;opacity:.45;margin-top:4px;letter-spacing:.22em;}
  /* Manga FX */
  .mfx{position:fixed;pointer-events:none;z-index:9999;font-size:28px;color:var(--K);
    text-shadow:3px 3px 0 var(--Y);animation:mP .7s ease forwards;white-space:nowrap;font-family:'ZCOOL KuaiLe',cursive;}
  @keyframes mP{0%{opacity:1;transform:scale(.3) rotate(-18deg);}30%{opacity:1;transform:scale(1.45) rotate(10deg);}100%{opacity:0;transform:scale(1.1) translateY(-48px) rotate(-6deg);}}
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <span class="fD" style="color:var(--Y);font-size:13px;letter-spacing:.3em;">JPTI</span>
    <span class="fG" style="color:white;font-size:14px;letter-spacing:.08em;">日语学习人格测试</span>
    <div class="hTag fD">テスト</div>
  </header>
  <div style="flex:1;position:relative;overflow:hidden;">
    <!-- START -->
    <div id="sStart" class="sc">
      <div class="logoS">🎌</div>
      <div class="sT fG">你是哪种<br>日语学习者？</div>
      <div class="sJ fD">あなたはどのタイプ？</div>
      <div class="infoC fD">
        📋 共 <strong>17 题</strong>，约 <strong>3 分钟</strong>完成<br>
        
        🎭 揭晓你的日语学习人设图鉴<br>
        🎧 <span class="iTag">开音量</span> 享受风铃 BGM ✦
      </div>
      <button class="btnS fG" onclick="startQuiz()">开始鉴定<span class="fD">テストを始める →</span></button>
    </div>
    <!-- QUIZ -->
    <div id="sQuiz" class="sc hidden">
      <div class="qBody">
        <div>
          <div class="pRow">
            <span class="pLbl fD">进度 <em id="qC">01</em> / <span id="qT">14</span></span>
            
          </div>
          <div class="pTrack"><div class="pFill" id="pF" style="width:0%"></div></div>
        </div>
        <div class="qN fD" id="qN">Q.01</div>
        <div class="qT" id="qTx">载入中...</div>
        <div class="qJ fD" id="qJp"></div>
        <div class="oWrap" id="opts"></div>
        <div class="qFt">
          <button class="btnP fG" id="btnP" onclick="goBack()" style="display:none">← 上题</button>
          <button class="btnNx fG" id="btnNx" onclick="goNext()" disabled>下一题</button>
        </div>
      </div>
    </div>
    <!-- LOADING -->
    <div id="sLoad" class="sc hidden">
      <div class="lFig" id="lF">🔍</div>
      <div class="lMsg fG" id="lM">正在潜入大脑<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
      <div class="lSub fD">ANALYZING YOUR JAPANESE DNA</div>
    </div>
    <!-- RESULT -->
    <div id="sResult" class="sc hidden">
      <div class="rScr">
        <div class="rHero" id="rH">
          <div class="rBadge fD">あなたのタイプ · YOUR TYPE</div>
          <div class="rImg" id="rIm"></div>
          <div class="rEn fD" id="rEn"></div>
          <div class="rNm fG" id="rNm"></div>
          <div class="rJN fD" id="rJN"></div>
          <div class="rBf" id="rBf"></div>
        </div>
        <div class="rBody">
          <div class="rCard">
            <div class="rCT fD">扎心鉴定 · CHARACTER ANALYSIS</div>
            <p class="rDes" id="rDes"></p>
          </div>
          <div class="rCard">
            <div class="rCT fD">雷达图巅峰属性 · PEAK STATS</div>
            <div class="pTags fD" id="rPk"></div>
            <div class="dBars" id="rDm"></div>
          </div>
          <button class="btnR fG" onclick="resetQuiz()">再来一次<span class="fD">もう一度テストする</span></button>
        </div>
      </div>
    </div>
  </div>
</div>

// Audio
const Audio=(()=>{
  let ctx=null,bgT=null;
  const init=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();};
  const note=(freq,type,dur,vol=.15,delay=0)=>{if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();const t=ctx.currentTime+delay;o.type=type;o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+dur);};
  const click=()=>{note(880,'sine',.05,.12);note(1200,'sine',.03,.06,.03);};
  const confirm=()=>{note(523,'triangle',.12,.17,0);note(659,'triangle',.12,.17,.08);};
  const jaan=()=>{[523.25,659.25,783.99,1046.5].forEach((f,i)=>note(f,'triangle',.8,.1,i*.04));note(1318.51,'sine',.5,.08,.2);};
  const CF=[1318.51,1567.98,1760,2093,2349.32,2637.02];
  const chime=()=>{if(!ctx)return;const f=CF[Math.floor(Math.random()*CF.length)],t=ctx.currentTime;const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.03,t+.008);g.gain.exponentialRampToValueAtTime(.001,t+2);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+2.1);const o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='sine';o2.frequency.setValueAtTime(f*2,t);g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.007,t+.005);g2.gain.exponentialRampToValueAtTime(.001,t+.8);o2.connect(g2).connect(ctx.destination);o2.start(t);o2.stop(t+.9);};
  const startBGM=()=>{if(!ctx)return;const sz=ctx.sampleRate*2,buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;const flt=ctx.createBiquadFilter();flt.type='highpass';flt.frequency.value=3000;const gn=ctx.createGain();gn.gain.value=.007;src.connect(flt).connect(gn).connect(ctx.destination);src.start();const ding=()=>{if(Math.random()>.3){chime();if(Math.random()>.6)setTimeout(()=>chime(),300);}bgT=setTimeout(ding,1800+Math.random()*3200);};bgT=setTimeout(ding,1200);};
  return{init,click,confirm,jaan,startBGM};
})();

const LF=['🔍','🧠','⚗️','📡','🧬'];
let questions=[],step=0,history=[],tmpScore=null,canUndo=false,lTmr=null;

function show(id){document.querySelectorAll('.sc').forEach(el=>el.classList.toggle('hidden',el.id!==id));}

function startQuiz(){
  Audio.init();Audio.confirm();Audio.startBGM();
  questions=[...ALL_Q];
  for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];}
  step=0;history=[];tmpScore=null;canUndo=false;
  document.getElementById('qT').textContent=questions.length;
  show('sQuiz');renderQ();
}

function renderQ(){
  const q=questions[step],n=step+1,tot=questions.length,isLast=step===tot-1;
  document.getElementById('qC').textContent=String(n).padStart(2,'0');
  document.getElementById('qN').textContent='Q.'+String(n).padStart(2,'0');
  document.getElementById('qTx').textContent=q.text;
  document.getElementById('qJp').textContent=q.jp;
  
  document.getElementById('pF').style.width=(n/tot*100)+'%';
  tmpScore=null;
  const nb=document.getElementById('btnNx');
  nb.disabled=true;nb.className='btnNx fG';nb.textContent=isLast?'揭晓结果 →':'下一题 →';
  const pb=document.getElementById('btnP');
  pb.style.display=(step>0&&canUndo)?'':'none';
  const c=document.getElementById('opts');c.innerHTML='';
  const LBL=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const d=document.createElement('div');d.className='opt';
    d.innerHTML='<div class="oK fD">'+LBL[i]+'</div><div class="oT">'+opt.t+'</div>';
    d.onclick=()=>{Audio.click();spawnMFX(d);c.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));d.classList.add('sel');tmpScore=opt.s;nb.disabled=false;nb.className='btnNx fG on';};
    c.appendChild(d);
  });
  c.scrollTop=0;
}

function goNext(){if(!tmpScore)return;Audio.confirm();history.push(tmpScore);canUndo=true;step<questions.length-1?(step++,renderQ()):runLoad();}
function goBack(){if(step>0&&canUndo){Audio.click();history.pop();step--;canUndo=false;renderQ();}}

function runLoad(){
  show('sLoad');let mi=0;
  const mE=document.getElementById('lM'),fE=document.getElementById('lF');
  const bump=()=>{mE.style.opacity='0';setTimeout(()=>{mi=(mi+1)%LM.length;mE.innerHTML=LM[mi]+'<span class="dots"><span>.</span><span>.</span><span>.</span></span>';fE.textContent=LF[mi%LF.length];mE.style.opacity='1';},200);};
  lTmr=setInterval(bump,700);
  setTimeout(()=>{clearInterval(lTmr);calcResult();},2600);
}

function calcResult(){
  const tot=[0,0,0,0,0,0,0];
  history.forEach(s=>s.forEach((v,i)=>tot[i]+=v));
  const norm=tot.map(v=>Math.max(-1,Math.min(1,v)));
  let sc=PERSONAS.map(p=>{let m=0;norm.forEach((v,i)=>m+=Math.abs(v-p.attributes[i]));return{...p,m};});
  sc.sort((a,b)=>a.m-b.m);
  const minM=sc[0].m;
  let cands=sc.filter(p=>p.m===minM);
  if(cands.length>1){cands=cands.map(p=>{let e=0;norm.forEach((v,i)=>e+=Math.pow(v-p.attributes[i],2));return{...p,e:Math.sqrt(e)};});cands.sort((a,b)=>a.e-b.e);}
  renderResult(cands[0],norm);Audio.jaan();show('sResult');document.querySelector('.rScr').scrollTop=0;
}

function renderResult(r,norm){
  document.getElementById('rH').style.background=r.color;
  const im=document.getElementById('rIm');
  im.innerHTML='<img src="'+IMGS[r.id]+'" alt="'+r.name+'" style="width:100%;height:100%;object-fit:contain;">';
  document.getElementById('rEn').textContent=r.enName;
  document.getElementById('rNm').textContent=r.name;
  document.getElementById('rJN').textContent=r.jpName;
  document.getElementById('rBf').textContent=r.brief;
  document.getElementById('rDes').textContent=r.desc;
  document.getElementById('rPk').innerHTML=r.peaks.map(p=>'<span class="pTag">'+p+'</span>').join('');
  document.getElementById('rDm').innerHTML=DIM_LABELS.map((lbl,i)=>{
    const pct=Math.round((norm[i]+1)/2*100);
    return '<div class="dRow"><span class="dLbl fD">'+lbl+'</span><div class="dTrk"><div class="dFil" style="width:0%;background:'+DIM_COLORS[i]+'" data-p="'+pct+'"></div></div><span class="dVal fD">'+pct+'</span></div>';
  }).join('');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{document.querySelectorAll('.dFil[data-p]').forEach(el=>{el.style.width=el.getAttribute('data-p')+'%';});}));
}

function resetQuiz(){Audio.confirm();show('sStart');}
</script>
